# Single Dokploy stack: Traefik + Uptime Kuma + app (replaces separate host `docker-compose` for infra).
# Dokploy: docker compose -p <appName> -f ./docker-compose.dokploy.yml up -d --build
# Env from Dokploy compose Environment (mirrors former host .env for TRAEFIK_HOST, ACME_EMAIL, HOST_PORT, KUMA_PORT).
# KUMA_PORT default 3002 (host) → 3001 (container): avoids clashing with local `npm run dev:server` on 3001.
# Volumes are external so we keep existing data from the old `stock-screener` Compose project names.

services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "${KUMA_PORT:-3002}:3001"
    volumes:
      - uptime-kuma-data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - stock-screener-net

  stock-screener:
    build: .
    image: stock-screener:latest
    container_name: stock-screener
    restart: unless-stopped
    # Dokploy writes `.env` here from the compose “Environment” field; without this, only the
    # three keys below are injected — SUPABASE_* and other secrets never reach the container.
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8080}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Secure by default in production. Override to 1 only if you intentionally want the public site
      # to trigger /api/cron/experts-sync without a Bearer secret.
      CRON_ALLOW_EXPERTS_BROWSER_SYNC: "0"
    volumes:
      - screener-data:/app/data
    networks:
      - stock-screener-net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # Dokploy's shared Traefik joins dokploy-network, so advertise that network for routing.
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.stock-screener.rule=Host(`${TRAEFIK_HOST:?Set TRAEFIK_HOST in Dokploy env}`)"
      - "traefik.http.routers.stock-screener.entrypoints=websecure"
      - "traefik.http.routers.stock-screener.tls.certresolver=letsencrypt"
      - "traefik.http.services.stock-screener.loadbalancer.server.port=3000"

networks:
  stock-screener-net:
    external: true
  dokploy-network:
    external: true

volumes:
  uptime-kuma-data:
    external: true
    name: stock-screener_uptime-kuma-data
  screener-data:
    external: true
    name: stock-screener_screener-data
