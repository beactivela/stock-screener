# Run the stock-screener app on Hostinger VPS (or any host with Docker).
# Usage: copy .env.example to .env, set your secrets, then:
#   docker compose up -d
# Logs: docker compose logs -f

services:
  app:
    build: .
    image: stock-screener:latest
    container_name: stock-screener
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    # Optional: persist local data/ on host (if not using Supabase)
    # volumes:
    #   - ./data:/app/data
