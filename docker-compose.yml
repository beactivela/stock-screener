# Stock screener app stack on Hostinger VPS (or any Docker host)
# ──────────────────────────────────────────────────────────────
# This stack expects a shared/external Traefik to already be running for the host.
# Create one shared Docker network (example): `docker network create traefik-public`
# then set TRAEFIK_DOCKER_NETWORK=traefik-public in .env if you use a different name.
# Set TRAEFIK_HOST in the project .env for Compose label interpolation.
# Production: stocks.scaleagent.org → set TRAEFIK_HOST=stocks.scaleagent.org in .env on the server.
# Published HOST_PORT remains useful for localhost/cron; Traefik reaches the container on port 3000.
#
#   docker compose up -d --build
#
# Dokploy production app stack: see docker-compose.dokploy.yml.
# Optional Watchtower (GHCR pull) — off by default; enable with:
#   COMPOSE_PROFILES=watchtower docker compose --profile watchtower up -d
#
# Uptime Kuma (same Compose stack): dashboard on host KUMA_PORT (default 3002 → container 3001). Avoids clashing with
#   local `npm run dev:server` which uses host 3001. From Kuma’s UI add a monitor
#   URL: http://stock-screener:3000/api/health  (Docker DNS; bypasses Traefik). Public: https://stocks.scaleagent.org/api/health
#
networks:
  default:
    name: stock-screener-net
  # Shared reverse-proxy network. External Traefik must join the same network.
  traefik-public:
    external: true
    name: ${TRAEFIK_DOCKER_NETWORK:-traefik-public}

services:
  stock-screener:
    build: .
    image: stock-screener:latest
    container_name: stock-screener
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Same-origin /experts Sync button without pasting CRON_SECRET; set CRON_ALLOW_EXPERTS_BROWSER_SYNC=0 in .env to require Bearer.
      CRON_ALLOW_EXPERTS_BROWSER_SYNC: "1"
    volumes:
      - screener-data:/app/data
    networks:
      - default
      - traefik-public
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      # Pin backend attachment so shared Traefik chooses the cross-stack proxy network.
      - "traefik.docker.network=${TRAEFIK_DOCKER_NETWORK:-traefik-public}"
      # Host rule + TLS: must be set in project .env for Compose interpolation (not only inside the container).
      - "traefik.http.routers.stock-screener.rule=Host(`${TRAEFIK_HOST:?Set TRAEFIK_HOST in .env}`)"
      - "traefik.http.routers.stock-screener.entrypoints=websecure"
      - "traefik.http.routers.stock-screener.tls.certresolver=letsencrypt"
      - "traefik.http.services.stock-screener.loadbalancer.server.port=3000"

  watchtower:
    profiles: ["watchtower"]
    # Not on default path; use profile watchtower explicitly if you need GHCR auto-pull.
    image: containrrr/watchtower:latest
    container_name: stock-screener-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Docker Engine 29+ requires API ≥1.44; containrrr/watchtower defaults to 1.25 and crash-loops without this.
      DOCKER_API_VERSION: "1.53"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_POLL_INTERVAL: "300"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "${KUMA_PORT:-3002}:3001"
    volumes:
      - uptime-kuma-data:/app/data
    labels:
      # Omit from Watchtower unless you opt in (Kuma major upgrades are easier to control manually).
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  screener-data:
  uptime-kuma-data:
