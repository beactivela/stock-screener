# Stock screener on Hostinger VPS (or any Docker host)
# ─────────────────────────────────────────────────────
# Traefik (Hostinger template): host network + Docker provider, exposedbydefault=false.
# Set TRAEFIK_HOST in .env to a DNS name that points at this VPS (for HTTPS + routing).
# Published HOST_PORT is optional (localhost/cron); Traefik reaches the container on port 3000.
#
#   docker compose up -d --build
#
networks:
  default:
    name: stock-screener-net

services:
  stock-screener:
    build: .
    image: stock-screener:latest
    container_name: stock-screener
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      VERCEL: ""
    volumes:
      - screener-data:/app/data
    labels:
      - "traefik.enable=true"
      # Set TRAEFIK_HOST in .env (DNS must point at this VPS for Let’s Encrypt)
      - "traefik.http.routers.stock-screener.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.stock-screener.entrypoints=websecure"
      - "traefik.http.routers.stock-screener.tls.certresolver=letsencrypt"
      - "traefik.http.services.stock-screener.loadbalancer.server.port=3000"

volumes:
  screener-data:
