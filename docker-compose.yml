# Stock screener on Hostinger VPS (or any Docker host)
# ─────────────────────────────────────────────────────
# Traefik (Hostinger template): host network + Docker provider, exposedbydefault=false.
# Set TRAEFIK_HOST in .env to a DNS name that points at this VPS (for HTTPS + routing).
# Production: stocks.scaleagent.org → set TRAEFIK_HOST=stocks.scaleagent.org in .env on the server.
# Published HOST_PORT is optional (localhost/cron); Traefik reaches the container on port 3000.
#
#   docker compose up -d --build
#
# Optional auto-pull when GHCR :latest digest changes (label-scoped):
#   docker compose --profile watchtower up -d
#
# Uptime Kuma (same Compose stack): dashboard on host KUMA_PORT (default 3001). From Kuma’s UI add a monitor
#   URL: http://stock-screener:3000/api/health  (Docker DNS; bypasses Traefik). Public: https://stocks.scaleagent.org/api/health
#
networks:
  default:
    name: stock-screener-net

services:
  # Reverse proxy + Let’s Encrypt. Without this, TRAEFIK_* labels on stock-screener do nothing and nothing binds :80/:443.
  traefik:
    # v3.6+ negotiates Docker API with the daemon (Docker 29+ requires API 1.44+; v3.3 pinned 1.24 and broke the provider).
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    environment:
      TZ: UTC
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/letsencrypt
    command:
      - --log.level=INFO
      - --api.dashboard=false
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=stock-screener-net
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?Set ACME_EMAIL in .env for Let’s Encrypt}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    networks:
      - default

  stock-screener:
    build: .
    image: stock-screener:latest
    container_name: stock-screener
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
    volumes:
      - screener-data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      # Host rule + TLS: TRAEFIK_HOST in .env (e.g. stocks.scaleagent.org). DNS A/AAAA → this VPS for Let’s Encrypt.
      - "traefik.http.routers.stock-screener.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.stock-screener.entrypoints=websecure"
      - "traefik.http.routers.stock-screener.tls.certresolver=letsencrypt"
      - "traefik.http.services.stock-screener.loadbalancer.server.port=3000"

  watchtower:
    profiles: ["watchtower"]
    image: containrrr/watchtower:latest
    container_name: stock-screener-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Docker Engine 29+ requires API ≥1.44; containrrr/watchtower defaults to 1.25 and crash-loops without this.
      DOCKER_API_VERSION: "1.53"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_POLL_INTERVAL: "300"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "${KUMA_PORT:-3001}:3001"
    volumes:
      - uptime-kuma-data:/app/data
    labels:
      # Omit from Watchtower unless you opt in (Kuma major upgrades are easier to control manually).
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  screener-data:
  uptime-kuma-data:
  traefik-acme:
