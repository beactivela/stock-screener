# Deploy to your VPS over SSH after you configure GitHub repository secrets.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST         — server hostname or IP
#   VPS_USER         — SSH user (e.g. ubuntu, root, deploy)
#   VPS_SSH_KEY      — private key (full PEM, including BEGIN/END lines)
#   VPS_DEPLOY_PATH  — absolute path to the clone on the server (e.g. /opt/stock-screener)
#
# Optional:
#   VPS_DOCKER_USE_SUDO — set to "true" if the SSH user must run `sudo docker compose`
#                         (prefer adding the user to the `docker` group instead)
#
# One-time on the server: clone repo, copy .env.example → .env, fill secrets, ensure
# deploy user can run docker (group docker or sudo).
#
# Trigger: Actions → "Deploy to VPS" → Run workflow (pick branch).

name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch for the server to checkout and pull
        required: true
        default: main

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          GIT_BRANCH: ${{ github.event.inputs.branch }}
          DOCKER_USE_SUDO: ${{ secrets.VPS_DOCKER_USE_SUDO }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 2m
          command_timeout: 30m
          # GitHub-hosted runners don't have your VPS host key pre-registered; accept on first connect.
          host_key_checking: false
          envs: DEPLOY_PATH,GIT_BRANCH,DOCKER_USE_SUDO
          script_stop: true
          script: |
            set -euo pipefail
            test -n "${DEPLOY_PATH:-}" || { echo "VPS_DEPLOY_PATH secret is empty"; exit 1; }
            cd "$DEPLOY_PATH"
            dc() {
              if [ "${DOCKER_USE_SUDO:-}" = "true" ]; then
                sudo docker compose "$@"
              else
                docker compose "$@"
              fi
            }
            git fetch origin --prune
            git checkout "$GIT_BRANCH"
            git pull --ff-only origin "$GIT_BRANCH"
            dc up -d --build
            dc ps
