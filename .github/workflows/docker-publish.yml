# Build and push image to GHCR. VPS: Watchtower pulls :latest, or run docker compose pull.
name: Docker publish

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/docker-publish.yml'
      - 'Dockerfile'
      - '.dockerignore'
      - 'server/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'index.html'
      - 'public/**'
      - 'vendor/**'
      - 'scripts/tradingagents/**'
      - 'requirements-tradingagents.txt'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}
